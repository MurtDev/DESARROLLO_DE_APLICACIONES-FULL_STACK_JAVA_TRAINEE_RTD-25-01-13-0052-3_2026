<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <title>Selectores</title>
    <style>
        .resaltar {
            background-color: blueviolet;
            color: white;
            font-size: 20px;
        }
    </style>

</head>
<body>
    <div class="container">
        <div class="row mb-3">
            <div class="col">
                <h1 id="titulo">Hola Mundo!</h1>
                <button id="boton-cambiar-titulo" class="btn btn-primary">Cambiar título</button>
            </div>
        </div>
        <div class="row mb-3">
            <div class="col">
                <p class="texto">Parrafo uno</p>
                <p class="texto">Parrafo dos</p>
                <button id="boton-cambiar-parrafos" class="btn btn-primary">Cambiar parrafos</button>
                <button id="boton-cambiar-parrafos2" class="btn btn-primary">Cambiar parrafos 2</button>
                <button id="boton-cambiar-parrafos3" class="btn btn-primary">Cambiar parrafos 3</button>
            </div>
        </div>
        <div class="row mb-3">
            <div class="col">
                <h3>Manipulación de texto</h3>
                <p id="mensaje">Esto es un mensaje</p>
            </div>
        </div>
        <div class="row">
            <div class="col">
                <h3>Obtener datos desde los inputs</h3>
                <input type="number" id="num-uno">
                <input type="number" id="num-dos">
                <button id="btn-mostrar-suma" class="btn btn-primary">Sumar</button>
                <div>
                    <p id="resultadoSuma" class="mt-2"></p>
                </div>
            </div>
        </div>
    </div>

    <script src="selectores.js"></script>
</body>
</html>
